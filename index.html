<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.ico" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Warehouse picking application" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Picking" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <title>Warehouse Picking</title>
</head>

<body>
  <div id="root"></div>
  <script>
    // #region agent log
    (function () {
      const endpoint = 'http://127.0.0.1:7288/ingest/6f7b4d02-d61c-4f1d-8ac9-ac4f4b312881';
      const basePayload = {
        sessionId: '845059',
        runId: 'run2',
        hypothesisId: 'H6',
        timestamp: Date.now()
      };

      fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Debug-Session-Id': '845059' },
        body: JSON.stringify({
          ...basePayload,
          location: 'index.html:22',
          message: 'Index bootstrap script executed',
          data: { href: window.location.href }
        })
      }).catch(() => { });

      window.addEventListener('error', function (event) {
        fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Debug-Session-Id': '845059' },
          body: JSON.stringify({
            ...basePayload,
            hypothesisId: 'H4',
            location: 'index.html:34',
            message: 'Early window error',
            data: {
              message: event.message || null,
              filename: event.filename || null,
              lineno: event.lineno || null,
              colno: event.colno || null
            },
            timestamp: Date.now()
          })
        }).catch(() => { });
      });

      window.addEventListener('unhandledrejection', function (event) {
        fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Debug-Session-Id': '845059' },
          body: JSON.stringify({
            ...basePayload,
            hypothesisId: 'H5',
            location: 'index.html:53',
            message: 'Early unhandled rejection',
            data: {
              reason: String(event.reason || 'unknown')
            },
            timestamp: Date.now()
          })
        }).catch(() => { });
      });
    })();
    // #endregion
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
